animations = (

  # OPEN
  {
    triggers = [ "open" ];
    preset = "appear";
    duration = 0.25;
    scale = 0.5;
  },

  # CLOSE
  {
    triggers = [ "close" ];
    preset = "disappear";
    duration = 0.25;
    scale = 0.5;
  },

  # SHOW (Like Hyprland)
  {
    triggers = [ "show" ];
    preset = "appear";
    #preset = "fly-in";
    direction = "up";
    duration = 0.5;
  },

  # HIDE
  {
    triggers = [ "hide" ];
    suppressions = ["open", "show"];
    # preset = "disappear";
    preset = "fly-out";
    direction = "down";
    duration = 0.65;
  },

  # GEOMETRY CHANGES (VERY IMPORTANT)
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    duration = 0.25;
  }

);
